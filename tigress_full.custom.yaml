# Rime patch: tigress_full
#
# 本文件是“词库 · 全字集”补丁，也是词库常用补丁 tigress.custom.yaml 的父配置。
# 全字集包含常用字。
#
# 补丁来源：
#   tiger_base.custom.yaml -> tigress_full.custom.yaml
#
# 下级补丁：
#   tigress.custom.yaml 继承本文件，再覆盖成常用字词典。
#
# 修改指南：
#   1. 词库全字集和词库常用都要生效：改本文件。
#   2. 只改词库常用：改 tigress.custom.yaml。
#   3. 四个方案都要生效：改 tiger_base.custom.yaml。

patch:
  __include: tiger_base.custom:/patch
  translator/dictionary: tigress_full.extended #引入增补自定词典，这个不要改动
