# Rime schema: tigress_full
# encoding: utf-8
#
# 本文件是“词库 · 全字集”方案，也是词库常用方案 tigress 的父配置。
# 全字集包含常用字，并在这里启用词库版加词/删词/调序。
#
# 配置来源：
#   tiger_base.schema.yaml -> tigress_full.schema.yaml
#
# 下级方案：
#   tigress.schema.yaml 继承本文件，再覆盖成常用字词典。
#
# 修改指南：
#   1. 词库全字集和词库常用都要生效：改本文件 / tigress_full.custom.yaml。
#   2. 只改词库常用：改 tigress.schema.yaml / tigress.custom.yaml。
#   3. 四个方案都要改：改 tiger_base.schema.yaml / tiger_base.custom.yaml。

__include: tiger_base.schema:/

schema:
  description: |
    虎码官方词库
    字集：全字集 99144 字，是 9767 字的父集
    敲 ` 鍵進入拼音反查
  name: "虎码词库全字集 99144字"
  schema_id: tigress_full

engine:
  processors:
    - ascii_composer
    - recognizer
    - lua_processor@*option_sync #跨窗口同步功能开关
    - lua_processor@*input_speed_stat*processor #测速统计开关
    - lua_processor@*djs_countdown*processor #倒计时管理
    - lua_processor@*mars*processor #火星文命令开关
    - lua_processor@*space_proc3 #标顶空码不上屏
    - lua_processor@*symbol_proc #候选唯一时符号顶字
    - lua_processor@*tigress_user_words*processor #用户加词、减词、调序
    - key_binder
    - speller
    - punctuator
    - lua_processor@exe_processor #exe启动器
    - selector
    - navigator
    - express_editor #计算
  filters:
    - lua_filter@*tigress_user_words*filter #用户加词、减词、调序
    # - charset_filter@utf8
    # - charset_filter@gbk
    # - charset_filter@gb2312
    # - charset_filter@big5
    - simplifier@simplification  #简繁滤镜
    # - simplifier@fanjian  #繁简滤镜
    # - reverse_lookup_filter@reverse_lookup #反查词典滤镜
    - simplifier@pinyin  #拼音滤镜
    - simplifier@chaifen #拆分滤镜
    - simplifier@emoji_cn  #表情滤镜
    - lua_filter@*djs_countdown*filter #倒计时管理状态
    - lua_filter@*mars #火星文滤镜
    - lua_filter@charset_comment_filter #Unicode分区提示滤镜
    - lua_filter@lua_unicode_display_filter #Unicode编码显示
    - uniquifier #过滤重复

translator:
  dictionary: tigress_full.extended
