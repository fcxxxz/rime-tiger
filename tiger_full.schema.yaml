# Rime schema: tiger_full
# encoding: utf-8
#
# 本文件是“单字 · 全字集”方案，也是单字常用方案 tiger 的父配置。
# 全字集包含常用字。
#
# 配置来源：
#   tiger_base.schema.yaml -> tiger_full.schema.yaml
#
# 下级方案：
#   tiger.schema.yaml 继承本文件，再覆盖成常用字词典。
#
# 修改指南：
#   1. 单字全字集和单字常用都要生效：改本文件 / tiger_full.custom.yaml。
#   2. 只改单字常用：改 tiger.schema.yaml / tiger.custom.yaml。
#   3. 四个方案都要改：改 tiger_base.schema.yaml / tiger_base.custom.yaml。

__include: tiger_base.schema:/

schema:
  description: |
    虎码官方单字
    字集：全字集 99144 字，是 9767 字的父集
    敲 ` 鍵進入拼音反查
  name: "虎码单字全字集 99144字"
  schema_id: tiger_full

translator:
  dictionary: tiger_full.extended
