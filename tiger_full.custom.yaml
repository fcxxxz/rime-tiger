# Rime patch: tiger_full
#
# 本文件是“单字 · 全字集”补丁，也是单字常用补丁 tiger.custom.yaml 的父配置。
# 全字集包含常用字。
#
# 补丁来源：
#   tiger_base.custom.yaml -> tiger_full.custom.yaml
#
# 下级补丁：
#   tiger.custom.yaml 继承本文件，再覆盖成常用字词典。
#
# 修改指南：
#   1. 单字全字集和单字常用都要生效：改本文件。
#   2. 只改单字常用：改 tiger.custom.yaml。
#   3. 四个方案都要生效：改 tiger_base.custom.yaml。

patch:
  __include: tiger_base.custom:/patch
  translator/dictionary: tiger_full.extended #引入增补自定词典，这个不要改动
